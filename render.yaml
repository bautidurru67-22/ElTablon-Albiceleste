services:
  - type: web
    name: tablon-albiceleste-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "8000"
      - key: LOG_LEVEL
        value: INFO
      - key: SCRAPING_ENABLED
        value: "true"
      - key: FRONTEND_URL
        # Completar con URL de Vercel después del deploy del frontend
        value: https://tablon-albiceleste.vercel.app
    healthCheckPath: /api/health
    autoDeploy: true
